output-dir: "{cwd}/outputs/file-vault/notifications-svc"
emit:
  - "@qninhdt/typespec-ent"
  - "@typespec/protobuf"
options:
  "@qninhdt/typespec-ent":
    output-dir: "{cwd}/outputs/file-vault/notifications-svc/ent"
    standalone: true
    library-name: "github.com/example/file-vault/notifications-svc"
    collection-strategy: "jsonb"
    include:
      - "FileVault.Notifications"
    auto-include-dependencies: true
  "@typespec/protobuf":
    emitter-output-dir: "{cwd}/outputs/file-vault/notifications-svc/protobuf"
