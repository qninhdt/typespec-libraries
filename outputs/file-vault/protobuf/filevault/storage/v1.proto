syntax = "proto3";

package filevault.storage.v1;

enum StorageObjectState {
  PENDING = 0;
  AVAILABLE = 1;
  QUARANTINED = 2;
  DELETED = 3;
}

enum UploadState {
  INITIATED = 0;
  RECEIVING = 1;
  COMPLETED = 2;
  ABORTED = 3;
  EXPIRED = 4;
}

enum StorageObjectStateCode {
  UNSPECIFIED = 0;
  PENDING = 1;
  AVAILABLE = 2;
  QUARANTINED = 3;
  DELETED = 4;
}

message StorageObjectView {
  string id = 1;
  string bucket = 2;
  string object_key = 3;
  int64 size_bytes = 4;
  string sha256 = 5;
  string media_type = 6;
  StorageObjectStateCode state = 7;
}

message BeginUploadRequest {
  string account_id = 1;
  string file_name = 2;
  string media_type = 3;
  int64 expected_size_bytes = 4;
  optional string expected_sha256 = 5;
}

message BeginUploadResponse {
  string upload_session_id = 1;
  string storage_object_id = 2;
  optional string signed_upload_url = 3;
  string expires_at_iso = 4;
}

message UploadChunk {
  string upload_session_id = 1;
  int32 part_number = 2;
  int64 offset_bytes = 3;
  bytes data = 4;
  bool final_chunk = 5;
}

message UploadReceipt {
  string upload_session_id = 1;
  int64 bytes_received = 2;
  int32 part_count = 3;
}

message CompleteUploadRequest {
  string upload_session_id = 1;
  string sha256 = 2;
  int64 size_bytes = 3;
}

message CompleteUploadResponse {
  StorageObjectView object = 1;
}

message GetDownloadUrlRequest {
  string storage_object_id = 1;
  string requester_id = 2;
  int32 expires_in_seconds = 3;
}

message GetDownloadUrlResponse {
  string storage_object_id = 1;
  string signed_download_url = 2;
  string expires_at_iso = 3;
}

service StorageService {
  rpc BeginUpload(BeginUploadRequest) returns (BeginUploadResponse);
  rpc Upload(stream UploadChunk) returns (UploadReceipt);
  rpc CompleteUpload(CompleteUploadRequest) returns (CompleteUploadResponse);
  rpc GetDownloadUrl(GetDownloadUrlRequest) returns (GetDownloadUrlResponse);
}
