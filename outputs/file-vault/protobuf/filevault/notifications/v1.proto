syntax = "proto3";

package filevault.notifications.v1;

enum NotificationChannel {
  IN_APP = 0;
  EMAIL = 1;
  WEBHOOK = 2;
}

enum NotificationState {
  QUEUED = 0;
  SENT = 1;
  FAILED = 2;
}

enum NotificationStateCode {
  UNSPECIFIED = 0;
  UNREAD = 1;
  READ = 2;
  ARCHIVED = 3;
}

message NotificationView {
  string id = 1;
  string recipient_id = 2;
  string subject = 3;
  string body = 4;
  NotificationStateCode state = 5;
  optional string resource_type = 6;
  optional string resource_id = 7;
  optional string read_at_iso = 8;
}

message ListNotificationsRequest {
  string recipient_id = 1;
  bool unread_only = 2;
  PageRequest page = 3;
}

message ListNotificationsResponse {
  repeated NotificationView notifications = 1;
  PageInfo page = 2;
}

message CreateNotificationRequest {
  string recipient_id = 1;
  string subject = 2;
  string body = 3;
  optional string resource_type = 4;
  optional string resource_id = 5;
}

message MarkNotificationReadRequest {
  string notification_id = 1;
  string recipient_id = 2;
}

message NotificationStreamRequest {
  string recipient_id = 1;
}

service NotificationService {
  rpc CreateNotification(CreateNotificationRequest) returns (NotificationView);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkRead(MarkNotificationReadRequest) returns (Ack);
  rpc Subscribe(NotificationStreamRequest) returns (stream NotificationView);
}
