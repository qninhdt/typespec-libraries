syntax = "proto3";

package filevault.shared.v1;

message ActorRef {
  string id = 1;
  string display_name = 2;
  optional string email = 3;
}

message PageRequest {
  uint32 page_size = 1;
  optional string page_token = 2;
}

message PageInfo {
  optional string next_page_token = 1;
  optional uint64 total_count = 2;
}

message StringPair {
  string key = 1;
  string value = 2;
}

message Ack {
  bool ok = 1;
  optional string message = 2;
}
