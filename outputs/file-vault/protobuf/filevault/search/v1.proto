syntax = "proto3";

package filevault.search.v1;

enum IndexState {
  PENDING = 0;
  INDEXED = 1;
  FAILED = 2;
  REMOVED = 3;
}

message SearchFilesRequest {
  string owner_id = 1;
  string query = 2;
  repeated string media_types = 3;
  repeated string labels = 4;
  PageRequest page = 5;
}

message SearchHit {
  FileView file = 1;
  optional string snippet = 2;
  float score = 3;
}

message SearchFilesResponse {
  repeated SearchHit hits = 1;
  PageInfo page = 2;
}

message SuggestLabelsRequest {
  string owner_id = 1;
  string prefix = 2;
  int32 limit = 3;
}

message SuggestLabelsResponse {
  repeated string labels = 1;
}

message ReindexFileRequest {
  string file_id = 1;
  string requested_by = 2;
}

service SearchService {
  rpc SearchFiles(SearchFilesRequest) returns (SearchFilesResponse);
  rpc SuggestLabels(SuggestLabelsRequest) returns (SuggestLabelsResponse);
  rpc ReindexFile(ReindexFileRequest) returns (Ack);
}
